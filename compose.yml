name: neurocalc-landing

services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
    image: neurocalc-landing:latest
    container_name: neurocalc-landing
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.landing.rule=Host(`neurocalc.com.br`) || Host(`www.neurocalc.com.br`)"
      - "traefik.http.routers.landing.entrypoints=web,websecure"
      - "traefik.http.routers.landing.tls=true"
      - "traefik.http.routers.landing.tls.certresolver=mytlschallenge"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

# Rede externa do Traefik (projeto root/n8n). Nao e criada aqui, apenas referenciada.
networks:
  traefik:
    name: root_default
    external: true
